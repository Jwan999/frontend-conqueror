# nginx example: expose the gate at a public HTTPS hostname.
#
# Drop this into /etc/nginx/sites-available/ and symlink to sites-enabled.
# Provision TLS via certbot:  certbot --nginx -d gate.my-domain.com

server {
    listen 80;
    server_name gate.my-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gate.my-domain.com;

    ssl_certificate     /etc/letsencrypt/live/gate.my-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gate.my-domain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:54322;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Gate routes are tiny; keep timeouts modest.
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}